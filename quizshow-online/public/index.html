<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Online Quizshow</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #253763, #070812);
      color: white;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 22px;
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .container { max-width: 1400px; margin: auto; padding: 20px; }
    .card {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      margin-bottom: 15px;
    }
    input, textarea {
      width: 100%;
      padding: 13px;
      margin: 7px 0;
      border-radius: 12px;
      border: 0;
      font-size: 16px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 11px 16px;
      margin: 5px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #00d4ff, #7c4dff);
      color: white;
    }
    .danger { background: linear-gradient(135deg, #ff3b3b, #9d0000); }
    .success { background: linear-gradient(135deg, #00c853, #009624); }
    .warning { background: linear-gradient(135deg, #ffb300, #ff6f00); }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 20px;
      align-items: start;
    }
    .players { display: flex; flex-direction: column; gap: 15px; }
    .player {
      background: rgba(255,255,255,0.11);
      border-radius: 20px;
      padding: 14px;
      text-align: center;
    }
    .out { opacity: .35; filter: grayscale(1); }
    .cam {
      height: 145px;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      margin-bottom: 10px;
    }
    .cam iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .name { font-size: 23px; font-weight: bold; }
    .lives { font-size: 28px; margin: 8px 0; }
    .question {
      min-height: 130px;
      background: rgba(0,0,0,.35);
      border-radius: 22px;
      padding: 22px;
      font-size: 28px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: 15px 0;
    }
    .vote-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    pre {
      white-space: pre-wrap;
      background: rgba(0,0,0,.25);
      border-radius: 14px;
      padding: 12px;
      font-size: 17px;
    }
    .small { font-size: 14px; opacity: .8; }
    @media (max-width: 950px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>DER DÜMMSTE FLIEGT</header>

<div class="container">
  <div class="card">
    <h2>Als Spieler zuschalten</h2>
    <input id="joinName" placeholder="Dein Name">
    <input id="cameraUrl" placeholder="Optional: Kamera-Link, z. B. VDO.Ninja-Link">
    <button class="success" onclick="joinGame()">Teilnehmen</button>
    <p class="small">Diesen Link kannst du an alle schicken. Der Quizmaster nutzt dieselbe Seite.</p>
  </div>

  <div class="layout">
    <div class="players" id="leftPlayers"></div>

    <div class="card" style="text-align:center;">
      <h2>Quizmaster</h2>
      <textarea id="questionInput" rows="3" placeholder="Frage eingeben"></textarea>
      <button onclick="setQuestion()">Frage anzeigen</button>
      <button class="warning" onclick="resetVotes()">Votes zurücksetzen</button>
      <button class="danger" onclick="applyVoteResult()">Meistgewählten Leben abziehen</button>
      <button class="danger" onclick="resetGame()">Ganzes Spiel zurücksetzen</button>

      <div class="question" id="question">Noch keine Frage</div>

      <h3>Voting</h3>
      <input id="voterName" placeholder="Dein Name beim Voten">
      <div class="vote-area" id="voteButtons"></div>

      <h3>Vote-Ergebnis</h3>
      <pre id="voteResult">Noch keine Votes</pre>
    </div>

    <div class="players" id="rightPlayers"></div>
  </div>
</div>

<script>
  const socket = io();
  let game = null;

  socket.on("gameState", (state) => {
    game = state;
    render();
  });

  function joinGame() {
    const name = document.getElementById("joinName").value;
    const cameraUrl = document.getElementById("cameraUrl").value;
    socket.emit("addPlayer", { name, cameraUrl });
    document.getElementById("voterName").value = name;
  }

  function setQuestion() {
    socket.emit("setQuestion", document.getElementById("questionInput").value);
  }

  function resetVotes() {
    socket.emit("resetVotes");
  }

  function applyVoteResult() {
    socket.emit("applyVoteResult");
  }

  function resetGame() {
    if (confirm("Wirklich alles zurücksetzen?")) {
      socket.emit("resetGame");
    }
  }

  function vote(targetId) {
    const voterName = document.getElementById("voterName").value;
    if (!voterName.trim()) {
      alert("Bitte deinen Namen beim Voten eingeben.");
      return;
    }
    socket.emit("vote", { voterName, targetId });
  }

  function loseLife(id) {
    socket.emit("loseLife", id);
  }

  function addLife(id) {
    socket.emit("addLife", id);
  }

  function render() {
    if (!game) return;

    document.getElementById("question").innerText = game.question;

    const left = document.getElementById("leftPlayers");
    const right = document.getElementById("rightPlayers");
    const voteButtons = document.getElementById("voteButtons");
    const voteResult = document.getElementById("voteResult");

    left.innerHTML = "";
    right.innerHTML = "";
    voteButtons.innerHTML = "";

    game.players.forEach((p, index) => {
      const div = document.createElement("div");
      div.className = "player" + (p.out ? " out" : "");

      let cam = "Keine Kamera";
      if (p.cameraUrl) {
        cam = `<iframe src="${p.cameraUrl}" allow="camera; microphone; autoplay"></iframe>`;
      }

      div.innerHTML = `
        <div class="cam">${cam}</div>
        <div class="name">${p.name}</div>
        <div class="lives">${"❤️".repeat(p.lives)}${"🖤".repeat(3 - p.lives)}</div>
        <button class="danger" onclick="loseLife('${p.id}')">- Leben</button>
        <button class="success" onclick="addLife('${p.id}')">+ Leben</button>
      `;

      if (index % 2 === 0) left.appendChild(div);
      else right.appendChild(div);

      if (!p.out) {
        const btn = document.createElement("button");
        btn.innerText = p.name;
        btn.onclick = () => vote(p.id);
        voteButtons.appendChild(btn);
      }
    });

    const counts = {};
    Object.values(game.votes).forEach(id => {
      counts[id] = (counts[id] || 0) + 1;
    });

    if (Object.keys(counts).length === 0) {
      voteResult.innerText = "Noch keine Votes";
    } else {
      let text = "";
      game.players.forEach(p => {
        text += `${p.name}: ${counts[p.id] || 0}\n`;
      });
      voteResult.innerText = text;
    }
  }
</script>
</body>
</html>
